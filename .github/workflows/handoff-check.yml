name: Handoff Contract Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  handoff-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate handoff contract and regression cases
        shell: pwsh
        run: ./scripts/handoff-check.tests.ps1
