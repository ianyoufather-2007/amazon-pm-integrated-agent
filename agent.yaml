id: amazon-pm-integrated-agent
name: Amazon PM Integrated Agent
version: 0.2.0
language: zh-CN
entrypoint: AGENT.md
recommended_use:
  - Amazon 产品机会初判
  - 是否进入完整阶段门工作流
  - 000-007 阶段路由
  - 市场/竞品/VOC/ROI/供应链/合规/专利分析
  - Excel/PPT 上会交付前的结构化梳理
upstream_repositories:
  core_skill: https://github.com/ianyoufather-2007/amazon-product-manager-skill
  pm_workflow_agent: https://github.com/ianyoufather-2007/01-product-manager-workflow-agent
included_scope:
  - clean routing layer
  - public stage-gate summaries
  - three-round execution boundaries
  - machine-readable handoff contract
  - delivery QA and executive pressure test
  - prompt templates
  - anonymized examples
excluded_scope:
  - raw ASIN data
  - optional advanced stage-gate source files
  - Excel/PPT/PDF deliverables
  - screenshots/cache/private business records
output_rules:
  - 默认中文输出
  - 默认 Amazon US
  - 区分事实层、判读层、风险层、待决策层
  - 缺失数据必须标注 P0/P1/P2
  - 跨阶段交接必须写明允许输出、禁止输出和验收条件
  - 不编造数据
  - 不替用户或会议做最终裁定
  - 不替代法律、合规、财务、专利或采购专业意见
privacy_rules:
  - 不复制 raw ASIN 数据
  - 不发布 Excel/PPT/PDF/截图/cache
  - 不发布账号、cookie、session、供应商报价或私有业务数据
