name: Content Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  content-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate workflow content
        shell: pwsh
        run: ./scripts/content-check.ps1
